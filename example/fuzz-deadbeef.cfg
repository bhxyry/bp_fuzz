[SUT]
file_path = ./example/fuzz-deadbeef.elf
machine = stm32vldiscovery
entry_function = deadbeef
until_rotate_breakpoints = 100
max_breakpoints = 4


[Fuzzer]
total_time = 600
single_run_time = 20


[GDB]
path_to_gdb = /opt/homebrew/bin/gdb
gdb_server_address = localhost:1234

[output]
output_directory = ./output

[log]
log_level = INFO