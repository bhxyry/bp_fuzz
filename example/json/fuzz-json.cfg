[SUT]
file_path = ./example/json/fuzz-json.elf
machine = stm32vldiscovery
max_input_length = 30
cfg_file_path = ./example/json/cfg

[Fuzzer]
max_breakpoints = 8
until_rotate_breakpoints = 2000
total_time = 3600
seed_directory = 

[GDB]
path_to_gdb = /opt/homebrew/bin/gdb
gdb_server_address = localhost:1234

[output]
output_directory = ./output/json

[PC_sampling]
enabled = false
sample_interval = 10000
output_file = pc_samples.bin
plugin_path = dependencies/pc_sampling/pc_sampling.so

[log]
log_level = INFO